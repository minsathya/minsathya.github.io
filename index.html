<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sathya. - Home</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0b0b;
            --text-main: #ffffff;
            --text-muted: #666666;
            --pill-bg: #141414;
            --pill-border: #222222;
            --pill-hover: #1c1c1c;
            --pill-hover-border: #333333;
            --font-family: 'Poppins', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-family);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 60px 24px;
            max-width: 1140px;
            margin: 0 auto;
            width: 95%;
            -webkit-font-smoothing: antialiased;
        }

        /* Top Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 60px;
        }

        .logo {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: var(--text-main);
            text-decoration: none !important;
        }

        .toggle-icon {
            font-size: 24px;
            color: var(--text-main);
            cursor: pointer;
            user-select: none;
            transition: opacity 0.2s ease;
        }

        .toggle-icon:hover {
            opacity: 0.7;
        }

        /* Search Module */
        .search-container {
            width: 100%;
            max-width: 500px;
            margin: 0 auto 80px auto;
            position: relative;
        }

        .search-bar {
            width: 100%;
            background-color: var(--pill-bg);
            border: 1px solid var(--pill-border);
            border-radius: 50px;
            padding: 14px 24px 14px 52px;
            color: var(--text-main);
            font-family: var(--font-family);
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s ease, background-color 0.2s ease;
        }

        .search-bar:focus {
            border-color: #444444;
            background-color: #161616;
        }

        .search-bar::placeholder {
            color: #444444;
        }

        .search-icon {
            position: absolute;
            left: 22px;
            top: 50%;
            transform: translateY(-50%);
            width: 15px;
            height: 15px;
            color: #444444;
            pointer-events: none;
        }

        /* Main 3-Column Layout */
        .directory-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 50px;
            margin-bottom: 90px;
            align-items: start;
        }

        .column-box {
            display: flex;
            flex-direction: column;
        }

        .column-heading {
            font-size: 22px;
            font-weight: 600;
            color: var(--text-main);
            letter-spacing: -0.3px;
            margin-bottom: 24px;
            padding-left: 2px;
        }

        /* Beautiful left-aligned pill stack */
        .pills-container {
            display: flex;
            flex-direction: column;
            align-items: flex-start; /* Keeps pills naturally sized, not stretched wide */
            gap: 12px;
            list-style: none;
        }

        .pills-container li {
            width: auto;
        }

        .pills-container a {
            display: inline-flex;
            align-items: center;
            background-color: var(--pill-bg);
            border: 1px solid var(--pill-border);
            border-radius: 50px;
            padding: 9px 20px;
            color: var(--text-main);
            text-decoration: none !important;
            font-size: 14.5px;
            font-weight: 400;
            letter-spacing: -0.1px;
            transition: background-color 0.2s ease, border-color 0.2s ease;
            -webkit-tap-highlight-color: transparent !important;
        }

        /* Subtle minimalist response interaction */
        .pills-container a:hover, .pills-container a:active {
            background-color: var(--pill-hover);
            border-color: var(--pill-hover-border);
            text-decoration: none !important;
        }

        /* Flat Clean Footer */
        footer {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
            width: 100%;
        }

        .footer-navigation {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            width: 100%;
        }

        .footer-navigation a {
            background-color: var(--pill-bg);
            border: 1px solid var(--pill-border);
            border-radius: 50px;
            padding: 8px 18px;
            color: #888888;
            text-decoration: none !important;
            font-size: 13.5px;
            transition: all 0.2s ease;
            -webkit-tap-highlight-color: transparent !important;
        }

        .footer-navigation a:hover {
            background-color: var(--pill-hover);
            border-color: var(--pill-hover-border);
            color: #ffffff;
        }

        .copyright-text {
            color: #3a3a3a;
            font-size: 12.5px;
            letter-spacing: 0.2px;
        }

        /* Responsive Viewports */
        @media (max-width: 900px) {
            .directory-grid {
                grid-template-columns: 1fr;
                gap: 40px;
            }

            body {
                padding: 40px 20px;
            }

            header {
                margin-bottom: 40px;
            }

            .search-container {
                margin-bottom: 60px;
            }
        }

        @media (max-width: 480px) {
            .footer-navigation {
                display: grid;
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
            }

            .footer-navigation a {
                text-align: center;
                padding: 10px;
            }

            .footer-navigation a:last-child {
                grid-column: span 2;
            }
        }
    </style>
</head>
<body>

    <!-- Header navigation layout -->
    <header>
        <a href="#" class="logo">sathya.</a>
        <div class="toggle-icon">↔</div>
    </header>

    <main>
        <!-- Clean Premium Search Input -->
        <div class="search-container">
            <svg class="search-icon" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
            </svg>
            <input type="text" class="search-bar" placeholder="Search...">
        </div>

        <!-- Directory Columns Grid -->
        <div class="directory-grid">

            <!-- Category Column: UPSC -->
            <div class="column-box">
                <h2 class="column-heading">Upsc</h2>
                <ul class="pills-container">
                    <li><a href="#">Subjects</a></li>
                    <li><a href="#">Current affairs</a></li>
                    <li><a href="#">Ncert's</a></li>
                    <li><a href="#">Csat</a></li>
                    <li><a href="#">Notes</a></li>
                </ul>
            </div>

            <!-- Category Column: Planning -->
            <div class="column-box">
                <h2 class="column-heading">Planning</h2>
                <ul class="pills-container">
                    <li><a href="#">Travel planner</a></li>
                    <li><a href="#">Simple budget</a></li>
                    <li><a href="#">Task List</a></li>
                </ul>
            </div>

            <!-- Category Column: Growth -->
            <div class="column-box">
                <h2 class="column-heading">Growth</h2>
                <ul class="pills-container">
                    <li><a href="#">Goals</a></li>
                    <li><a href="#">Habit tracker</a></li>
                    <li><a href="#">Weekly plan</a></li>
                </ul>
            </div>

        </div>
    </main>

    <!-- Base Footer Section -->
    <footer>
        <div class="footer-navigation">
            <a href="#">About</a>
            <a href="#">Contact</a>
            <a href="#">Privacy Policy</a>
            <a href="#">Terms & Conditions</a>
            <a href="#">Disclaimer</a>
        </div>
        <div class="copyright-text">
            &copy; 2026 Sathya. All rights reserved.
        </div>
    </footer>

</body>
</html>
