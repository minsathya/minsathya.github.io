<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>sathya.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #0a0c0b;
      --pill-bg: #121814;
      --border-color: rgba(255, 255, 255, 0.08);
      --text-color: #ffffff;
      --icon-color: #d1d5db;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: 'Plus Jakarta Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Header Container with top spacing matching /study/ */
    header {
      width: 100%;
      display: flex;
      justify-content: center;
      padding-top: 2rem;
      padding-bottom: 1rem;
    }

    .header-pill {
      width: 90%;
      max-width: 1100px;
      height: 64px;
      background-color: var(--pill-bg);
      border: 1px solid var(--border-color);
      border-radius: 999px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
    }

    .logo {
      color: var(--text-color);
      font-size: 1.6rem;
      font-weight: 700;
      text-decoration: none;
      letter-spacing: -0.03em;
    }

    .nav-actions {
      display: flex;
      align-items: center;
      gap: 1.25rem;
    }

    .nav-btn {
      background: transparent;
      border: none;
      color: var(--icon-color);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.2s ease, transform 0.2s ease;
    }

    .nav-btn:hover {
      color: #ffffff;
      transform: scale(1.05);
    }

    main {
      width: 90%;
      max-width: 1100px;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4rem 0;
    }

    footer {
      padding: 2rem 0;
      font-size: 0.85rem;
      color: #6b7280;
    }
  </style>
</head>
<body>

  <header>
    <div class="header-pill">
      <a href="index.html" class="logo">sathya.</a>
      <div class="nav-actions">
        <!-- Theme Toggle Button -->
        <button class="nav-btn" id="theme-toggle" aria-label="Toggle theme">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"></path>
          </svg>
        </button>
        
        <!-- Search Button -->
        <button class="nav-btn" id="search-toggle" aria-label="Search">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <path d="m21 21-4.3-4.3"></path>
          </svg>
        </button>
      </div>
    </div>
  </header>

  <main>
    <!-- Main content goes here -->
  </main>

  <footer>
    &copy; 2026 Sathya. All rights reserved.
  </footer>

</body>
</html>
