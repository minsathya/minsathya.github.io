<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sathya. - Home</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0b0b;
            --card-bg: #121212;
            --table-header: #1b4740;
            --table-header-hover: #1d5b51;
            --accent-color: #257a6c;
            --text-main: #ffffff;
            --text-muted: #a0aec0;
            --border-color: #333333;
            --row-even: #111111;
            --row-odd: #000000;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Poppins', sans-serif;
            padding: 40px 24px;
            margin: 0 auto;
            width: 95%;
            max-width: 1200px;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            -webkit-font-smoothing: antialiased;
        }

        /* Top Navigation Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 50px;
        }

        .logo {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: var(--text-main);
            text-decoration: none !important;
        }

        .toggle-icon {
            font-size: 24px;
            color: var(--text-main);
            cursor: pointer;
            user-select: none;
            transition: opacity 0.2s ease;
        }

        .toggle-icon:hover {
            opacity: 0.8;
        }

        /* Centered Search Module */
        .search-container {
            width: 100%;
            max-width: 520px;
            margin: 0 auto 60px auto;
            position: relative;
        }

        .search-bar {
            width: 100%;
            background-color: transparent;
            border: 1px solid var(--border-color);
            border-radius: 50px;
            padding: 14px 24px 14px 52px;
            color: var(--text-main);
            font-family: 'Poppins', sans-serif;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s ease, background-color 0.2s ease;
        }

        .search-bar:focus {
            border-color: #555555;
            background-color: rgba(255, 255, 255, 0.01);
        }

        .search-bar::placeholder {
            color: #666666;
        }

        .search-icon {
            position: absolute;
            left: 22px;
            top: 50%;
            transform: translateY(-50%);
            width: 16px;
            height: 16px;
            color: #666666;
            pointer-events: none;
        }

        /* Master Dashboard Card - Matching ramsarsites.html */
        .dashboard-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 32px;
            margin-bottom: 50px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        /* Grid Layout for Directory Sections */
        .directory-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 32px;
            align-items: start;
        }

        /* Module Panels stylized exactly like the table elements */
        .module-panel {
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden;
            background-color: var(--bg-color);
        }

        .module-header {
            background-color: var(--table-header);
            color: #ffffff;
            font-size: 16px;
            font-weight: 700;
            padding: 14px 18px;
            border-bottom: 1px solid var(--border-color);
            letter-spacing: -0.2px;
        }

        .module-list {
            list-style: none;
            display: flex;
            flex-direction: column;
        }

        .module-list li {
            border-bottom: 1px solid var(--border-color);
            transition: background-color 0.2s ease;
        }

        .module-list li:last-child {
            border-bottom: none;
        }

        /* Alternating row colors matching the table data rows */
        .module-list li:nth-child(even) {
            background-color: var(--row-even);
        }

        .module-list li:nth-child(odd) {
            background-color: var(--row-odd);
        }

        /* Soft teal hover row effect from the note engine */
        .module-list li:hover {
            background-color: rgba(37, 122, 108, 0.12) !important;
        }

        .module-list a {
            display: block;
            padding: 14px 18px;
            color: var(--text-main);
            text-decoration: none !important;
            font-size: 14.5px;
            font-weight: 400;
            transition: color 0.2s ease;
        }

        .module-list a:hover {
            color: #ffffff;
        }

        /* Footer Stack & Navigation Bar matching ramsarsites.html aesthetics */
        footer {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
            width: 100%;
        }

        .footer-nav-bar {
            width: 100%;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 28px;
            flex-wrap: wrap;
        }

        .footer-nav-bar a {
            color: var(--text-main);
            text-decoration: none !important;
            font-size: 14px;
            font-weight: 400;
            transition: color 0.2s ease;
        }

        .footer-nav-bar a:hover {
            color: var(--text-muted);
        }

        .copyright-notice {
            color: #666666;
            font-size: 13px;
            font-weight: 400;
            text-align: center;
            letter-spacing: 0.1px;
        }

        /* Premium Responsive Layout Adaptation */
        @media (max-width: 950px) {
            .directory-grid {
                grid-template-columns: 1fr;
                gap: 28px;
            }
            
            .dashboard-card {
                padding: 24px;
            }

            header {
                margin-bottom: 35px;
            }
        }

        @media (max-width: 600px) {
            body {
                padding: 24px 16px;
                width: 100%;
            }

            .footer-nav-bar {
                flex-direction: column;
                gap: 16px;
                text-align: center;
                padding: 20px 16px;
            }
            
            .logo {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>

    <!-- Platform Header Area -->
    <header>
        <a href="#" class="logo">sathya.</a>
        <div class="toggle-icon">↔</div>
    </header>

    <main>
        <!-- Centered Platform Search Bar -->
        <div class="search-container">
            <svg class="search-icon" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
            </svg>
            <input type="text" class="search-bar" placeholder="Search...">
        </div>

        <!-- Master Hub Directory Card (Symmetrical with note sheets) -->
        <div class="dashboard-card">
            <div class="directory-grid">
                
                <!-- Section Module: UPSC -->
                <div class="module-panel">
                    <div class="module-header">Upsc</div>
                    <ul class="module-list">
                        <li><a href="#">Subjects</a></li>
                        <li><a href="#">Current affairs</a></li>
                        <li><a href="#">Ncert's</a></li>
                        <li><a href="#">Csat</a></li>
                        <li><a href="#">Notes</a></li>
                    </ul>
                </div>

                <!-- Section Module: Planning -->
                <div class="module-panel">
                    <div class="module-header">Planning</div>
                    <ul class="module-list">
                        <li><a href="#">Travel planner</a></li>
                        <li><a href="#">Simple budget</a></li>
                        <li><a href="#">Task List</a></li>
                    </ul>
                </div>

                <!-- Section Module: Growth -->
                <div class="module-panel">
                    <div class="module-header">Growth</div>
                    <ul class="module-list">
                        <li><a href="#">Goals</a></li>
                        <li><a href="#">Habit tracker</a></li>
                        <li><a href="#">Weekly plan</a></li>
                    </ul>
                </div>

            </div>
        </div>
    </main>

    <!-- Platform Footer Stack -->
    <footer>
        <div class="footer-nav-bar">
            <a href="#">About</a>
            <a href="#">Contact</a>
            <a href="#">Privacy Policy</a>
            <a href="#">Terms & Conditions</a>
            <a href="#">Disclaimer</a>
        </div>
        <div class="copyright-notice">
            &copy; 2026 Sathya. All rights reserved.
        </div>
    </footer>

</body>
</html>
