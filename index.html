<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sathya.</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0b0b;
            --text-main: #ffffff;
            --text-muted: #555555;
            --layout-border: #1a1a1a;
            --pill-bg: rgba(255, 255, 255, 0.03);
            --pill-border: rgba(255, 255, 255, 0.06);
            --pill-hover-bg: rgba(255, 255, 255, 0.06);
            --pill-hover-border: rgba(255, 255, 255, 0.12);
            --font-family: 'Poppins', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-family);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 60px 24px;
            max-width: 1000px;
            margin: 0 auto;
            width: 95%;
            -webkit-font-smoothing: antialiased;
        }

        /* Platform Top Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 60px;
        }

        .logo {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: var(--text-main);
            text-decoration: none !important;
        }

        .toggle-icon {
            font-size: 24px;
            color: var(--text-main);
            cursor: pointer;
            user-select: none;
        }

        /* Minimal Centered Search Module */
        .search-container {
            width: 100%;
            max-width: 480px;
            margin: 0 auto 80px auto;
            position: relative;
        }

        .search-bar {
            width: 100%;
            background-color: transparent;
            border: 1px solid var(--pill-border);
            border-radius: 50px;
            padding: 14px 24px 14px 52px;
            color: var(--text-main);
            font-family: var(--font-family);
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s ease;
        }

        .search-bar:focus {
            border-color: #444444;
        }

        .search-bar::placeholder {
            color: var(--text-muted);
        }

        .search-icon {
            position: absolute;
            left: 22px;
            top: 50%;
            transform: translateY(-50%);
            width: 15px;
            height: 15px;
            color: var(--text-muted);
            pointer-events: none;
        }

        /* Asymmetric Staggered Workspace Directory */
        .workspace-hub {
            display: flex;
            flex-direction: column;
            width: 100%;
            margin-bottom: 80px;
        }

        /* Primary Top Panel (Full-Width to destroy "subscription package" vibe) */
        .primary-block {
            width: 100%;
            padding-bottom: 40px;
            border-bottom: 1px solid var(--layout-border);
        }

        .section-label {
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            margin-bottom: 20px;
        }

        /* Fluid layout for the heavy academic items */
        .fluid-pill-row {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        /* Secondary Split Base Panel */
        .split-base-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 48px;
            padding-top: 40px;
        }

        .column-pane {
            display: flex;
            flex-direction: column;
        }

        /* Vertical organically sized pill layouts */
        .vertical-pill-stack {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 12px;
            list-style: none;
        }

        /* Unifying Premium Pill System Styles */
        .pill-link {
            display: inline-flex;
            align-items: center;
            background-color: var(--pill-bg);
            border: 1px solid var(--pill-border);
            border-radius: 50px;
            padding: 10px 22px;
            color: var(--text-main);
            text-decoration: none !important;
            font-size: 14.5px;
            font-weight: 400;
            transition: background-color 0.15s ease, border-color 0.15s ease;
            -webkit-tap-highlight-color: transparent !important;
        }

        .pill-link:hover {
            background-color: var(--pill-hover-bg);
            border-color: var(--pill-hover-border);
        }

        /* Grounded Minimalist Base Footer */
        footer {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
            width: 100%;
        }

        .footer-navigation-links {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 28px;
            flex-wrap: wrap;
            width: 100%;
        }

        .footer-navigation-links a {
            color: #444444;
            text-decoration: none !important;
            font-size: 14px;
            font-weight: 400;
            transition: color 0.2s ease;
        }

        .footer-navigation-links a:hover {
            color: #ffffff;
        }

        .copyright-notice-tag {
            color: #333333;
            font-size: 12.5px;
            letter-spacing: 0.2px;
        }

        /* Premium Responsive Breakpoint Adaptations */
        @media (max-width: 768px) {
            .split-base-grid {
                grid-template-columns: 1fr;
                gap: 40px;
                padding-top: 32px;
            }

            .primary-block {
                padding-bottom: 32px;
            }
            
            body {
                padding: 40px 20px;
            }

            header {
                margin-bottom: 40px;
            }

            .footer-navigation-links {
                gap: 16px 20px;
            }
        }
    </style>
</head>
<body>

    <!-- Header Block Area -->
    <header>
        <a href="#" class="logo">sathya.</a>
        <div class="toggle-icon">↔</div>
    </header>

    <main>
        <!-- Sleek Minimalist Search Bar Component -->
        <div class="search-container">
            <svg class="search-icon" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
            </svg>
            <input type="text" class="search-bar" placeholder="Search...">
        </div>

        <!-- Asymmetric Workspace Directory Layout Base -->
        <div class="workspace-hub">
            
            <!-- Full-Width Dominant Header Section: UPSC (Breaks the subscription box layout entirely) -->
            <div class="primary-block">
                <h2 class="section-label">Upsc</h2>
                <div class="fluid-pill-row">
                    <a href="#" class="pill-link">Subjects</a>
                    <a href="#" class="pill-link">Current affairs</a>
                    <a href="#" class="pill-link">Ncert's</a>
                    <a href="#" class="pill-link">Csat</a>
                    <a href="#" class="pill-link">Notes</a>
                </div>
            </div>

            <!-- Balanced Base Split Panel for Personal/Utility Tracking Lists -->
            <div class="split-base-grid">
                
                <!-- Secondary Column Block: PLANNING -->
                <div class="column-pane">
                    <h2 class="section-label">Planning</h2>
                    <ul class="vertical-pill-stack">
                        <li><a href="#" class="pill-link">Travel planner</a></li>
                        <li><a href="#" class="pill-link">Simple budget</a></li>
                        <li><a href="#" class="pill-link">Task List</a></li>
                    </ul>
                </div>

                <!-- Secondary Column Block: GROWTH -->
                <div class="column-pane">
                    <h2 class="section-label">Growth</h2>
                    <ul class="vertical-pill-stack">
                        <li><a href="#" class="pill-link">Goals</a></li>
                        <li><a href="#" class="pill-link">Habit tracker</a></li>
                        <li><a href="#" class="pill-link">Weekly plan</a></li>
                    </ul>
                </div>

            </div>

        </div>
    </main>

    <!-- Platform Base Footer -->
    <footer>
        <div class="footer-navigation-links">
            <a href="#">About</a>
            <a href="#">Contact</a>
            <a href="#">Privacy Policy</a>
            <a href="#">Terms & Conditions</a>
            <a href="#">Disclaimer</a>
        </div>
        <div class="copyright-notice-tag">
            &copy; 2026 Sathya. All rights reserved.
        </div>
    </footer>

</body>
</html>
