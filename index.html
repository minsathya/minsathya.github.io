<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sathya.</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0b0b;
            --text-main: #ffffff;
            --text-muted: #666666;
            --teal-accent: #1b4740;
            --pill-bg: rgba(255, 255, 255, 0.03);
            --pill-border: rgba(255, 255, 255, 0.08);
            --pill-hover: rgba(255, 255, 255, 0.06);
            --font-family: 'Poppins', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-family);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 60px 24px;
            max-width: 1050px;
            margin: 0 auto;
            width: 95%;
            -webkit-font-smoothing: antialiased;
        }

        /* Minimal Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 70px;
        }

        .logo {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: var(--text-main);
            text-decoration: none !important;
        }

        .toggle-icon {
            font-size: 24px;
            color: var(--text-main);
            cursor: pointer;
            user-select: none;
        }

        /* Premium Sleek Search Pill */
        .search-container {
            width: 100%;
            max-width: 480px;
            margin: 0 auto 80px auto;
            position: relative;
        }

        .search-bar {
            width: 100%;
            background-color: transparent;
            border: 1px solid var(--pill-border);
            border-radius: 50px;
            padding: 14px 24px 14px 52px;
            color: var(--text-main);
            font-family: var(--font-family);
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s ease;
        }

        .search-bar:focus {
            border-color: #444444;
        }

        .search-bar::placeholder {
            color: var(--text-muted);
        }

        .search-icon {
            position: absolute;
            left: 22px;
            top: 50%;
            transform: translateY(-50%);
            width: 15px;
            height: 15px;
            color: var(--text-muted);
            pointer-events: none;
        }

        /* Main Structured Grid */
        .main-layout {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 40px;
            margin-bottom: 100px;
            align-items: start;
        }

        .category-column {
            display: flex;
            flex-direction: column;
        }

        /* Clean Header Tag matching Ramsar tones */
        .column-tag {
            display: inline-block;
            align-self: flex-start;
            background-color: var(--teal-accent);
            color: #ffffff;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 6px 16px;
            border-radius: 50px;
            margin-bottom: 24px;
        }

        /* Low-profile Content Stack */
        .links-stack {
            display: flex;
            flex-direction: column;
            gap: 8px;
            list-style: none;
        }

        .links-stack a {
            display: block;
            background-color: var(--pill-bg);
            border: 1px solid var(--pill-border);
            border-radius: 8px;
            padding: 12px 20px;
            color: var(--text-main);
            text-decoration: none !important;
            font-size: 14.5px;
            font-weight: 400;
            transition: all 0.2s ease;
            -webkit-tap-highlight-color: transparent !important;
        }

        /* Flat premium hover mechanics without underlines */
        .links-stack a:hover {
            background-color: var(--pill-hover);
            border-color: #333333;
        }

        /* Grounded Borderless Footer */
        footer {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
            width: 100%;
        }

        .footer-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 24px;
            flex-wrap: wrap;
            width: 100%;
        }

        .footer-row a {
            color: var(--text-muted);
            text-decoration: none !important;
            font-size: 14px;
            font-weight: 400;
            transition: color 0.2s ease;
        }

        .footer-row a:hover {
            color: #ffffff;
        }

        .copyright {
            color: #333333;
            font-size: 12.5px;
            letter-spacing: 0.2px;
        }

        /* Responsive Breakpoints */
        @media (max-width: 850px) {
            .main-layout {
                grid-template-columns: 1fr;
                gap: 40px;
            }

            body {
                padding: 40px 20px;
            }

            header {
                margin-bottom: 40px;
            }
        }
    </style>
</head>
<body>

    <!-- Header Area -->
    <header>
        <a href="#" class="logo">sathya.</a>
        <div class="toggle-icon">↔</div>
    </header>

    <main>
        <!-- Search Pill Bar -->
        <div class="search-container">
            <svg class="search-icon" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
            </svg>
            <input type="text" class="search-bar" placeholder="Search...">
        </div>

        <!-- Clean Directory Layout -->
        <div class="main-layout">

            <!-- UPSC Module -->
            <div class="category-column">
                <span class="column-tag">Upsc</span>
                <ul class="links-stack">
                    <li><a href="#">Subjects</a></li>
                    <li><a href="#">Current affairs</a></li>
                    <li><a href="#">Ncert's</a></li>
                    <li><a href="#">Csat</a></li>
                    <li><a href="#">Notes</a></li>
                </ul>
            </div>

            <!-- PLANNING Module -->
            <div class="category-column">
                <span class="column-tag">Planning</span>
                <ul class="links-stack">
                    <li><a href="#">Travel planner</a></li>
                    <li><a href="#">Simple budget</a></li>
                    <li><a href="#">Task List</a></li>
                </ul>
            </div>

            <!-- GROWTH Module -->
            <div class="category-column">
                <span class="column-tag">Growth</span>
                <ul class="links-stack">
                    <li><a href="#">Goals</a></li>
                    <li><a href="#">Habit tracker</a></li>
                    <li><a href="#">Weekly plan</a></li>
                </ul>
            </div>

        </div>
    </main>

    <!-- Base Footer Navigation -->
    <footer>
        <div class="footer-row">
            <a href="#">About</a>
            <a href="#">Contact</a>
            <a href="#">Privacy Policy</a>
            <a href="#">Terms & Conditions</a>
            <a href="#">Disclaimer</a>
        </div>
        <div class="copyright">
            &copy; 2026 Sathya. All rights reserved.
        </div>
    </footer>

</body>
</html>
